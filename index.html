<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>スタッツ入力</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f3f4f6;
margin:0;
padding:8px;
}

.card{
background:#fff;
padding:14px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.form-row{
display:flex;
flex-direction:column;
margin-bottom:10px;
}

.form-row label{
font-size:13px;
font-weight:bold;
margin-bottom:4px;
color:#374151;
}

input,select{
padding:8px;
border-radius:8px;
border:1px solid #cbd5e1;
font-size:15px;
}

.player-list{
display:grid;
grid-template-columns:1fr 1fr;
gap:4px;
max-height:200px;
overflow:auto;
font-size:14px;
}

.counter{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:4px;
}

.counter button{
width:32px;
height:32px;
border:none;
border-radius:6px;
background:#e2e8f0;
}

.value{
width:30px;
text-align:center;
}

.timer{
color:#2563eb;
font-weight:bold;
margin-left:6px;
}

button{
width:100%;
padding:8px;
border:none;
border-radius:8px;
margin-top:6px;
font-size:15px;
}

.primary{background:#2563eb;color:#fff;}
.success{background:#16a34a;color:#fff;}

</style>
</head>

<body>

<h2>スタッツ</h2>

<div class="card">

<div class="form-row">
<label>日にち</label>
<input type="date" id="matchDate">
</div>

<div class="form-row">
<label>対戦相手</label>
<input type="text" id="opponent">
</div>

<div class="form-row">
<label>フォーメーション</label>
<select id="formation">
<option value="">選択</option>
<option>4-2-1</option>
<option>3-3-1</option>
<option>2-3-2</option>
</select>
</div>

</div>

<div class="card">

<div>入力タイプ</div>

<label><input type="radio" name="mode" value="attack">攻撃</label>
<label><input type="radio" name="mode" value="defense">守備</label>
<label><input type="radio" name="mode" value="both">攻守両方</label>

</div>

<div class="card">

<div>出場選手</div>

<div class="player-list" id="playerList"></div>

<button class="primary" onclick="startMatch()">試合開始</button>
<button class="success" onclick="finishMatch()">試合終了</button>
<button class="primary" onclick="clearAllData()">全クリア</button>

</div>

<div id="inputArea"></div>

<button class="success" onclick="exportExcel()">Excel出力</button>
<button class="primary" onclick="exportCSV()">CSV出力</button>

<script>

const players=[
"2 りょう","3 はるみち","4 いっさ","5 はるや","6 だいち","7 ひなた",
"8 りく","9 あつと","10 だいき","11 とうり","13 しゅうせい",
"14 けいすけ","17 ゆうだい","18 しょう","19 しゅん","20 こう",
"22 にへこう","23 たもん","24 はたこう","25 けいま","26 とうま",
"27 そうしろう","28 しょうま","29 たいしん","30 ゆう",
"35 あやと","36 はる","37 かい","38 あらた","39 はると"
];

const attackKeys=["CHA","SHO","HD_O","THP","LP"];
const defenseKeys=["SZ","PO","HD_D","SL"];

let records={};
let playerState={};
let currentMode="";
let timerInterval=null;

const playerList=document.getElementById("playerList");

players.forEach(p=>{

const label=document.createElement("label");

const check=document.createElement("input");
check.type="checkbox";
check.value=p;
check.onchange=saveState;

label.appendChild(check);
label.append(" "+p);

const span=document.createElement("span");
span.id="timer_"+p.replace(" ","_");
span.className="timer";
span.innerText="00:00";

label.appendChild(span);

playerList.appendChild(label);

playerState[p]={active:false,time:0};

records[p]={};
[...attackKeys,...defenseKeys].forEach(k=>records[p][k]=0);

});

function startMatch(){

const mode=document.querySelector("input[name='mode']:checked");
if(!mode){alert("入力タイプ選択");return;}

currentMode=mode.value;

timerInterval=setInterval(()=>{

Object.keys(playerState).forEach(name=>{
if(playerState[name].active){
playerState[name].time++;
updateTimerUI(name);
}
});

saveState();

},1000);

}

function updateTimerUI(name){

const sec=playerState[name].time;
const m=Math.floor(sec/60);
const s=sec%60;

document.getElementById("timer_"+name.replace(" ","_")).innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

}

function finishMatch(){

clearInterval(timerInterval);
saveState();

}

function exportExcel(){

try{

const rows=buildRows();

const ws=XLSX.utils.aoa_to_sheet(rows);
const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"TM");

const wbout=XLSX.write(wb,{bookType:"xlsx",type:"array"});

const blob=new Blob([wbout],{
type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
});

saveAs(blob,buildFileName()+".xlsx");

}catch(e){

alert("Excel出力失敗 → CSV出力します");
exportCSV();

}

}

function exportCSV(){

const rows=buildRows();

let csv=rows.map(r=>r.join(",")).join("\n");

const blob=new Blob([csv],{type:"text/csv"});

saveAs(blob,buildFileName()+".csv");

}

function buildFileName(){

const d=(matchDate.value||"").replaceAll("-","");
const o=(opponent.value||"match").replace(/\s+/g,"");

return d+"_"+o;

}

function buildRows(){

const header=[
"対戦相手","日にち","フォーメーション","攻守",
"選手NO","選手名","出場時間",
"CHA","SHO","HD_O","THP","LP","SZ","PO","HD_D","SL"
];

const rows=[header];

Object.keys(playerState).forEach(player=>{

if(playerState[player].time<1)return;

const r=records[player];
const parts=player.split(" ");

const sec=playerState[player].time;
const m=Math.floor(sec/60);
const s=sec%60;

rows.push([
opponent.value,
matchDate.value,
formation.value,
currentMode,
parts[0],
parts[1],
`${m}:${s}`,
r.CHA,r.SHO,r.HD_O,r.THP,r.LP,r.SZ,r.PO,r.HD_D,r.SL
]);

});

return rows;

}

/* ===== 自動保存 ===== */

function saveState(){

localStorage.setItem("stats_state",JSON.stringify({
records,
playerState,
currentMode
}));

}

function loadState(){

const s=localStorage.getItem("stats_state");

if(!s)return;

const data=JSON.parse(s);

records=data.records||records;
playerState=data.playerState||playerState;
currentMode=data.currentMode||"";

}

loadState();

</script>

</body>
</html>
