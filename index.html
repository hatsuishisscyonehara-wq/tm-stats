<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>スタッツ入力</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f3f4f6;
margin:0;
padding:8px;
}

.card{
background:#fff;
padding:14px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.form-row{
display:flex;
flex-direction:column;
margin-bottom:10px;
}

.form-row label{
font-size:13px;
font-weight:bold;
margin-bottom:4px;
}

input,select{
padding:8px;
border-radius:8px;
border:1px solid #cbd5e1;
font-size:15px;
}

.player-list{
display:grid;
grid-template-columns:1fr 1fr;
gap:4px;
max-height:200px;
overflow:auto;
font-size:14px;
}

.counter{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:4px;
}

.counter button{
width:32px;
height:32px;
border:none;
border-radius:6px;
background:#e2e8f0;
}

.value{
width:30px;
text-align:center;
}

.timer{
color:#2563eb;
font-weight:bold;
margin-left:6px;
}

button, .link-btn{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:6px;
font-size:15px;
text-align:center;
display:block;
text-decoration:none;
}

.primary{background:#2563eb;color:#fff;}
.success{background:#16a34a;color:#fff;}
.warn{background:#f59e0b;color:#fff;}
.link{background:#0ea5e9;color:#fff;}
</style>
</head>

<body>

<h2>スタッツ入力</h2>

<a class="link-btn link" target="_blank"
href="https://docs.google.com/spreadsheets/d/1nC2e4qS2NVTOlQppacY1VGAB08Ew8jVZ8tSpw3uXr34/edit?gid=0#gid=0">
📊 スプシを開く
</a>

<div class="card">

<div class="form-row">
<label>記録員</label>
<input type="text" id="recorder" placeholder="コーチ氏名">
</div>

<div class="form-row">
<label>日にち</label>
<input type="date" id="matchDate">
</div>

<div class="form-row">
<label>対戦相手</label>
<input type="text" id="opponent">
</div>

<div class="form-row">
<label>試合番号</label>
<select id="matchNumber">
<option value="">選択</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>
</div>

<div class="form-row">
<label>フォーメーション</label>
<select id="formation">
<option value="">選択</option>
<option>4-2-1</option>
<option>3-3-1</option>
<option>2-3-2</option>
</select>
</div>
</div>

<div class="card">
<div>入力タイプ</div>
<label><input type="radio" name="mode" value="attack"> 攻撃</label>
<label><input type="radio" name="mode" value="defense"> 守備</label>
<label><input type="radio" name="mode" value="both"> 攻守両方</label>
</div>

<div class="card">
<div>出場選手</div>
<div class="player-list" id="playerList"></div>

<button class="primary" onclick="startMatch()">試合開始(後半開始)</button>
<button class="success" onclick="finishMatch()">試合終了(前半終了)</button>
<button class="primary" onclick="clearAllData()">全クリア</button>
</div>

<div id="inputArea"></div>

<button class="warn" onclick="exportGoogle()">Googleスプシ送信</button>

<a class="link-btn link" target="_blank"
href="https://docs.google.com/spreadsheets/d/1nC2e4qS2NVTOlQppacY1VGAB08Ew8jVZ8tSpw3uXr34/edit?gid=0#gid=0">
📊 スプシを開く
</a>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbxqCz9XHfNO3PUE266tHhoNzsIxojxfNA7V3-QomhUdSOFqrZK5dNrn7rBPNBBiLErf/exec";

const positionsList=["FW","CH","RH","LH","CB","RB","LB","GK"];
let positions={};

const labels={
CHA:"【攻撃】ドリブルチャレンジ",
SHO:"【攻撃】シュート",
HD_O:"【攻撃】ヘディング",
THP:"【攻撃】スルーパス",
LP:"【攻撃】ロングパス",
SZ:"【守備】ボール完全奪取",
PO:"【守備】抜かれた数",
HD_D:"【守備】ヘディングクリア",
SL:"【守備】スライディング"
};

const players=[
"2 りょう","3 はるみち","4 いっさ","5 はるや","6 だいち","7 ひなた",
"8 りく","9 あつと","10 だいき","11 とうり","13 しゅうせい",
"14 けいすけ","17 ゆうだい","18 しょう","19 しゅん","20 こう",
"22 にへこう","23 たもん","24 はたこう","25 けいま","26 とうま",
"27 そうしろう","28 しょうま","29 たいしん","30 ゆう",
"35 あやと","36 はる","37 かい","38 あらた","39 はると"
];

const attackKeys=["CHA","SHO","HD_O","THP","LP"];
const defenseKeys=["SZ","PO","HD_D","SL"];

let records={},playerState={},currentMode="",timerInterval=null;

players.forEach(p=>{
positions[p]="";

const label=document.createElement("label");
const check=document.createElement("input");
check.type="checkbox";
check.value=p;
check.onchange=syncPlayerTimer;

label.appendChild(check);
label.append(" "+p);

const span=document.createElement("span");
span.id="timer_"+p.replace(" ","_");
span.className="timer";
span.innerText="00:00";

label.appendChild(span);
playerList.appendChild(label);

playerState[p]={active:false,time:0};
records[p]={};
[...attackKeys,...defenseKeys].forEach(k=>records[p][k]=0);
});

function positionSelectHTML(name){
return `
<div class="form-row">
<label>ポジション</label>
<select onchange="positions['${name}']=this.value">
<option value="" ${!positions[name] ? "selected" : ""}>ポジション選択</option>
${positionsList.map(p=>`
<option value="${p}" ${positions[name]===p ? "selected" : ""}>
${p}
</option>`).join("")}
</select>
</div>`;
}

function renderCounters(){
inputArea.innerHTML="";
const checked=[...document.querySelectorAll("#playerList input:checked")];

checked.forEach(c=>{
const name=c.value;
const card=document.createElement("div");
card.className="card";

card.innerHTML=`<b>${name}</b>`;
card.innerHTML+=positionSelectHTML(name);

if(currentMode==="attack"||currentMode==="both"){
attackKeys.forEach(k=>card.innerHTML+=counterHTML(name,k));
}
if(currentMode==="defense"||currentMode==="both"){
defenseKeys.forEach(k=>card.innerHTML+=counterHTML(name,k));
}

inputArea.appendChild(card);
});
}

function counterHTML(name,key){
return `
<div class="counter">
<div style="flex:1">${labels[key]}</div>
<button onclick="change('${name}','${key}',-1)">-</button>
<div class="value" id="${name}_${key}">${records[name][key]}</div>
<button onclick="change('${name}','${key}',1)">+</button>
</div>`;
}

function change(player,key,delta){
records[player][key]+=delta;
if(records[player][key]<0)records[player][key]=0;
document.getElementById(`${player}_${key}`).innerText=records[player][key];
}

function startMatch(){
const mode=document.querySelector("input[name='mode']:checked");
if(!mode){alert("入力タイプ選択");return;}
currentMode=mode.value;
syncPlayerTimer();

if(!timerInterval){
timerInterval=setInterval(()=>{
Object.keys(playerState).forEach(name=>{
if(playerState[name].active){
playerState[name].time++;
updateTimerUI(name);
}});
},1000);
}
renderCounters();
}

function syncPlayerTimer(){
document.querySelectorAll("#playerList input").forEach(el=>{
playerState[el.value].active=el.checked;
});
renderCounters();
}

function updateTimerUI(name){
const sec=playerState[name].time;
const m=Math.floor(sec/60);
const s=sec%60;
document.getElementById("timer_"+name.replace(" ","_")).innerText=
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function finishMatch(){
clearInterval(timerInterval);
timerInterval=null;
}

function buildRows(){
const rows=[];
Object.keys(playerState)
.filter(n=>playerState[n].time>=1)
.forEach(player=>{
const r=records[player];
const parts=player.split(" ");

const sec=playerState[player].time;
const m=Math.floor(sec/60);
const s=sec%60;

rows.push({
対戦相手:opponent.value||"",
試合番号:matchNumber.value||"",
日にち:matchDate.value||"",
フォーメーション:"'"+(formation.value||""),
攻守:currentMode,
選手NO:parts[0],
選手名:parts[1],
ポジション:positions[player]||"",
出場時間:`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`,
CHA:r.CHA,SHO:r.SHO,HD_O:r.HD_O,THP:r.THP,LP:r.LP,
SZ:r.SZ,PO:r.PO,HD_D:r.HD_D,SL:r.SL,
記録員:recorder.value||""
});
});
return rows;
}

function exportGoogle(){
const rows=buildRows();
fetch(GAS_URL,{
method:"POST",
body:JSON.stringify(rows),
mode:"no-cors"
});
alert("✅ 送信完了");
}

function clearAllData(){
location.reload();
}

</script>

</body>
</html>
